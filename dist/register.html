<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - RepMetric / 360</title>
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  
  <script type="module" crossorigin src="/assets/register-a52f-mGW.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/supabaseClient-D4v529L2.js">
  <link rel="stylesheet" crossorigin href="/assets/styles-C2wZ_EGY.css">
</head>
<!-- Registration page -->
<body class="auth-page">

  <header class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        <a href="index.html" class="navbar-brand-link">
          <span class="material-symbols-outlined">fluid_med</span>
          <span class="brand-name">RepMetric / 360</span>
        </a>
      </div>
      
      <nav class="navbar-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="schedule.html" class="nav-link">My Schedule</a>
        <a href="support.html" class="nav-link">Support</a>
      </nav>
      
      <div class="navbar-actions">
        <a href="login.html" class="login-link">Login</a>
        <a href="register.html" class="register-button active">Register</a>
      </div>
      
      <button class="hamburger" aria-label="Toggle navigation menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>
    
    <div class="mobile-menu">
      <a href="index.html" class="mobile-link">Home</a>
      <a href="dashboard.html" class="mobile-link">Dashboard</a>
      <a href="schedule.html" class="mobile-link">My Schedule</a>
      <a href="support.html" class="mobile-link">Support</a>
      <div class="mobile-actions">
        <a href="login.html" class="mobile-login">Login</a>
        <a href="register.html" class="mobile-register active">Register</a>
      </div>
    </div>
  </header>

  <main class="auth-container">
    <div class="auth-card">
      <!-- copied from login para consistent -->
      <h1>Create New Account</h1>
      
      <!-- Registration form -->
      <form class="auth-form" id="registerForm">
        <div class="form-group">
          <label for="fullName">Full Name <span class="required">*</span></label>
          <input type="text" id="fullName" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address <span class="required">*</span></label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <!-- Password field -->
        <div class="form-group">
          <label for="password">Password <span class="required">*</span></label>
          <div class="password-input">
            <input type="password" id="password" placeholder="Enter password" required>
            <button type="button" class="password-toggle">
              <span class="material-symbols-outlined">visibility</span>
            </button>
          </div>
        </div>

        <!-- Confirm password -->
        <div class="form-group">
          <label for="confirm-password">Confirm Password <span class="required">*</span></label>
          <div class="password-input">
            <input type="password" id="confirm-password" placeholder="Confirm password" required>
            <button type="button" class="password-toggle">
              <span class="material-symbols-outlined">visibility</span>
            </button>
          </div>
        </div>

        <!-- Role selection - hidden by default, show via URL param for admin creation -->
        <div class="form-group" id="roleGroup" style="display: none;">
          <label for="role">Account Type</label>
          <select id="role">
            <option value="repmeds">Medical Representative</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <button type="submit" class="btn btn-block">Register</button>
      </form>

      <div class="auth-footer">
        <p>May account na? <a href="login.html">Login here</a></p>
      </div>
    </div>
  </main>

  <script>
    // Show role selector kung may ?admin=true sa URL
    // Para makagawa ng admin accounts
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('admin') === 'true') {
      document.getElementById('roleGroup').style.display = 'block';
    }
  </script>
</body>
</html>
