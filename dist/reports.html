<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Report History - RepMetric / 360</title>
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  
 
  <script type="module" crossorigin src="/assets/reports-Dz7LNgaq.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/auth-lOpszQbR.js">
  <link rel="stylesheet" crossorigin href="/assets/styles-Ck433avf.css">
</head>
<!-- 
  Reports page - history ng mga logged activities
  Add filter by date range
  NOTE: Dapat may export to PDF/Excel feature pero complicated na to too much pag antapos na lang maaaga
-->
<body>

  <header class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        <a href="index.html" class="navbar-brand-link">
          <span class="material-symbols-outlined">fluid_med</span>
          <span class="brand-name">RepMetric / 360</span>
        </a>
      </div>
      
      <nav class="navbar-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="admin.html" class="nav-link admin-only" style="display: none;">Admin</a>
        <a href="schedule.html" class="nav-link">My Schedule</a>
        <a href="support.html" class="nav-link">Support</a>
      </nav>
      
      <div class="navbar-actions">
        <button id="logoutBtn" class="btn btn-secondary">Logout</button>
      </div>
      
      <button class="hamburger" aria-label="Toggle navigation menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>
    
    <div class="mobile-menu">
      <a href="index.html" class="mobile-link">Home</a>
      <a href="dashboard.html" class="mobile-link">Dashboard</a>
      <a href="admin.html" class="mobile-link admin-only" style="display: none;">Admin</a>
      <a href="schedule.html" class="mobile-link">My Schedule</a>
      <a href="support.html" class="mobile-link">Support</a>
      <div class="mobile-actions">
        <button id="logoutBtnMobile" class="btn btn-secondary">Logout</button>
      </div>
    </div>
  </header>

  <main class="page-container">
    <div class="page-header with-action">
      <div>
        <h1>Daily Report History</h1>
        <p>List ng mga activities na na-log</p>
      </div>
      
      <button class="btn btn-primary">+ Create New Report</button>
    </div>

    <!-- Reports Table -->
  
    <div class="card">
      <div class="table-container">
        <table class="reports-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Doctor/Pharmacy</th>
              <th>Type</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="reportsTableBody">
  </tbody>
        </table>
      </div>
    </div>

    <!-- Weekly Summary -->
    <!-- Dapat to dynamic based sa actual data -->
    <section class="summary-section">
      <h2>Weekly Summary</h2>
      
      <div class="summary-grid">
        <div class="summary-card card">
          <h3>Total Reports</h3>
          <div class="summary-number" id="totalReportsCount">--</div>
    </div>

        <div class="summary-card card">
          <h3>Completed</h3>
          <div class="summary-number success" id="completedCount">--</div>
    </div>

        <div class="summary-card card">
          <h3>Pending</h3>
          <div class="summary-number warning" id="pendingCount">--</div>
    </div>
      </div>
    </section>
  </main>

  <script>
  const hamburger = document.querySelector('.hamburger');
  const mobileMenu = document.querySelector('.mobile-menu');

  hamburger.addEventListener('click', () => {
    mobileMenu.classList.toggle('active');
  });
</script>
</body>
</html>
