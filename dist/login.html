<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <script type="module" crossorigin src="/assets/login-tYTbXOKF.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/supabaseClient-D4v529L2.js">
  <link rel="stylesheet" crossorigin href="/assets/styles-C2wZ_EGY.css">
</head>
<!-- Login page -->
<body class="auth-page">

  <header class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        <a href="index.html" class="navbar-brand-link">
          <span class="material-symbols-outlined">fluid_med</span>
          <span class="brand-name">RepMetric / 360</span>
        </a>
      </div>
      
      <nav class="navbar-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="schedule.html" class="nav-link">My Schedule</a>
        <a href="support.html" class="nav-link">Support</a>
      </nav>
      
      <div class="navbar-actions">
        <a href="login.html" class="login-link active">Login</a>
        <a href="register.html" class="register-button">Register</a>
      </div>
      
      <button class="hamburger" aria-label="Toggle navigation menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>
    
    <div class="mobile-menu">
      <a href="index.html" class="mobile-link">Home</a>
      <a href="dashboard.html" class="mobile-link">Dashboard</a>
      <a href="schedule.html" class="mobile-link">My Schedule</a>
      <a href="support.html" class="mobile-link">Support</a>
      <div class="mobile-actions">
        <a href="login.html" class="mobile-login active">Login</a>
        <a href="register.html" class="mobile-register">Register</a>
      </div>
    </div>
  </header>

  <main class="auth-container">
    <div class="auth-card">
      <!-- Dapat may logo dito -->
      <h1>Login to Your Account</h1>
      
      <!-- Login form - basic muna -->
      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email Address <span class="required">*</span></label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="password">Password <span class="required">*</span></label>
          <div class="password-input">
            <input type="password" id="password" placeholder="Enter your password" required>
            <!-- TODO: ma-toggle yung password visibility -->
            <button type="button" class="password-toggle">
              <span class="material-symbols-outlined">visibility</span>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-block">Login</button>
      </form>

      <div class="auth-footer">
        <p>Wala pang account? <a href="register.html">Register here</a></p>
      </div>
    </div>
  </main>

</body>
</html>
