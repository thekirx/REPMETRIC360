<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - RepMetric / 360</title>
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  
  <script type="module" crossorigin src="/assets/login-CS7re1IM.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/auth-C6cLn3GG.js">
  <link rel="stylesheet" crossorigin href="/assets/styles-Ck433avf.css">
</head>

<body class="auth-page">

  <header class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        <a href="index.html" class="navbar-brand-link">
          <span class="material-symbols-outlined">fluid_med</span>
          <span class="brand-name">RepMetric / 360</span>
        </a>
      </div>
      
      <nav class="navbar-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="schedule.html" class="nav-link">My Schedule</a>
        <a href="support.html" class="nav-link">Support</a>
      </nav>
      
      <div class="navbar-actions">
        <a href="login.html" class="login-link active">Login</a>
        <a href="register.html" class="register-button">Register</a>
      </div>
      
      <button class="hamburger" aria-label="Toggle navigation menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>

    <div class="mobile-menu">
      <a href="index.html" class="mobile-link">Home</a>
      <a href="dashboard.html" class="mobile-link">Dashboard</a>
      <a href="schedule.html" class="mobile-link">My Schedule</a>
      <a href="support.html" class="mobile-link">Support</a>
      <div class="mobile-actions">
        <a href="register.html" class="mobile-link register-button">Register</a>
      </div>
    </div>
  </header>

  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <span class="material-symbols-outlined auth-logo">fluid_med</span>
        <h1>Login to Your Account</h1>
        <p>Enter your credentials to access the field force portal</p>
      </div>
      
      <div id="errorMessage" class="info-box warning" style="display: none; margin-bottom: 1rem;"></div>

      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email Address <span class="required">*</span></label>
          <input type="email" id="email" placeholder="Enter your email" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="password">Password <span class="required">*</span></label>
          <div class="password-input-wrapper">
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" class="password-toggle" id="togglePassword" aria-label="Show password">
              <span class="material-symbols-outlined" id="toggleIcon">visibility</span>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-block" id="loginBtn">
          <span class="btn-text">Login</span>
          <span class="loader" style="display: none;"></span>
        </button>
      </form>

      <div class="auth-footer">
        <p>Wala pang account? <a href="register.html">Register here</a></p>
        <p><small><a href="forgot-password.html">Forgot Password?</a></small></p>
      </div>
    </div>
  </main>

  <script>
    // DEV NOTE: Hamburger menu toggle lang ang natira dito, password toggle nasa login.js na
    const hamburger = document.querySelector('.hamburger');
    const mobileMenu = document.querySelector('.mobile-menu');

    // Hamburger Menu Logic
    hamburger.addEventListener('click', () => {
      mobileMenu.classList.toggle('active');
    });
  </script>
</body>
</html>
