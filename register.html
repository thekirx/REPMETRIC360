<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - RepMetric / 360</title>
  
  <link rel="stylesheet" href="styles.css">
  
  <script type="module" crossorigin src="/assets/register-a52f-mGW.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/supabaseClient-D4v529L2.js">
</head>

<body class="auth-page">

  <header class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        <a href="index.html" class="navbar-brand-link">
          <span class="material-symbols-outlined">fluid_med</span>
          <span class="brand-name">RepMetric / 360</span>
        </a>
      </div>
      
      <nav class="navbar-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="schedule.html" class="nav-link">My Schedule</a>
        <a href="support.html" class="nav-link">Support</a>
      </nav>
      
      <div class="navbar-actions">
        <a href="login.html" class="login-link">Login</a>
        <a href="register.html" class="register-button active">Register</a>
      </div>
      
      <button class="hamburger" aria-label="Toggle navigation menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>
  </header>

  <main class="auth-container">
    <div class="auth-card">
      <h1>Create New Account</h1>
      
      <div id="authMessage" class="alert" style="display: none;"></div>
      
      <form class="auth-form" id="registerForm">
        <div class="form-group">
          <label for="fullName">Full Name <span class="required">*</span></label>
          <input type="text" id="fullName" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address <span class="required">*</span></label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="password">Password <span class="required">*</span></label>
          <div class="password-input">
            <input type="password" id="password" placeholder="Enter password" required>
            <button type="button" class="password-toggle" id="togglePassword">
              <span class="material-symbols-outlined">visibility</span>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
          <div class="password-input">
            <input type="password" id="confirmPassword" placeholder="Confirm password" required>
            <button type="button" class="password-toggle" id="toggleConfirmPassword">
              <span class="material-symbols-outlined">visibility</span>
            </button>
          </div>
        </div>

        <div class="form-group" id="roleGroup" style="display: none;">
          <label for="role">Account Type</label>
          <select id="role">
            <option value="repmeds">Medical Representative</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <button type="submit" id="registerBtn" class="btn btn-block">Register</button>
      </form>

      <div class="auth-footer">
        <p>May account na? <a href="login.html">Login here</a></p>
      </div>
    </div>
  </main>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('admin') === 'true') {
      const roleGroup = document.getElementById('roleGroup');
      if (roleGroup) roleGroup.style.display = 'block';
    }
  </script>

</body>
</html>
