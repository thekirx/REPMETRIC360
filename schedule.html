<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Itinerary - RepMetric / 360</title>
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  
  <script type="module" crossorigin src="/assets/schedule-DDJ7L6aZ.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/supabaseClient-D4v529L2.js">
  <link rel="modulepreload" crossorigin href="/assets/auth-8WVZwt0Y.js">
<link rel="stylesheet" href="styles.css"></head>
<body>

  <header class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        <a href="index.html" class="navbar-brand-link">
          <span class="material-symbols-outlined">fluid_med</span>
          <span class="brand-name">RepMetric / 360</span>
        </a>
      </div>
      
      <nav class="navbar-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="schedule.html" class="nav-link active">My Schedule</a>
        <a href="support.html" class="nav-link">Support</a>
      </nav>
      
      <div class="navbar-actions">
        <button id="logoutBtn" class="btn btn-secondary">Logout</button>
      </div>
      
      <button class="hamburger" aria-label="Toggle navigation menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>
  </header>

  <main class="page-container">
    <div class="page-header">
      <h1>My Itinerary</h1>
      <p>Daily schedule and appointments</p>
    </div>

    <div class="schedule-grid">
      <div class="calendar-widget card">
        <div class="calendar-header">
          <button id="prevMonth" class="calendar-nav">&lt;</button>
          <h2 id="currentMonthDisplay">Loading...</h2>
          <button id="nextMonth" class="calendar-nav">&gt;</button>
        </div>
        <div class="calendar-grid" id="calendarGrid">
          <div class="calendar-day-header">Sun</div>
          <div class="calendar-day-header">Mon</div>
          <div class="calendar-day-header">Tue</div>
          <div class="calendar-day-header">Wed</div>
          <div class="calendar-day-header">Thu</div>
          <div class="calendar-day-header">Fri</div>
          <div class="calendar-day-header">Sat</div>
          </div>
      </div>

      <div class="appointments-section">
        <h2 id="selectedDateHeader">Select a day</h2>
        
        <div class="appointment-list" id="appointmentList">
          <p class="empty-msg">No appointments scheduled for this day.</p>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
